name: "Shellspec"

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]

env:
  SHELLSPEC_VERSION: 0.28.1
  TERM: xterm-256color
  HOMEBREW_NO_AUTO_UPDATE: 1
  HOMEBREW_NO_INSTALL_CLEANUP: 1
  HOMEBREW_NO_ENV_HINTS: 1
  # Enable CI auto-install mode for dependencies
  CI_E_BASH_INSTALL_DEPENDENCIES: 1

jobs:
  shellspec-macos:
    name: "MacOS"
    runs-on: macos-latest
    if: "!contains(github.event.head_commit.message, 'ci skip')"
    steps:
      - name: Checkout Code with full history
        uses: actions/checkout@v4
        with:
          fetch-depth: 0   # Full history needed for release-it to generate proper changelog
          fetch-tags: true # For correct version detection by release-it
      
      - name: Cache Homebrew packages
        uses: actions/cache@v4
        with:
          path: |
            ~/Library/Caches/Homebrew
            /opt/homebrew/Cellar
            /opt/homebrew/bin
          key: ${{ runner.os }}-homebrew-${{ hashFiles('.envrc') }}
          restore-keys: |
            ${{ runner.os }}-homebrew-
      
      - name: Cache local binaries
        uses: actions/cache@v4
        with:
          path: ~/.local/bin
          key: ${{ runner.os }}-local-bin-${{ hashFiles('.envrc') }}
          restore-keys: |
            ${{ runner.os }}-local-bin-
      
      - name: Setup PATH for local binaries
        run: |
          echo "${HOME}/.local/bin" >> "$GITHUB_PATH"
          mkdir -p "${HOME}/.local/bin"
      
      - name: Pre-install heavy dependencies in parallel
        run: |
          # Install heavy dependencies in background to leverage caching
          echo "Pre-installing heavy dependencies..."
          
          # Install core dependencies first
          if ! command -v direnv &> /dev/null; then
            brew install direnv &
          fi
          if ! command -v shellspec &> /dev/null; then
            brew install shellspec &
          fi
          
          # Install other dependencies in parallel (background)
          brew install grep gnu-sed gawk coreutils jq &
          
          # Wait for core dependencies
          wait
          echo "Core dependencies installed"
      
      - name: Setup project dependencies using DIRENV
        run: |
          # Allow .envrc execution and export environment to GitHub Actions
          direnv allow .
          direnv export gha >> "$GITHUB_ENV"
          echo "Dependencies loaded via DIRENV"
      
      - name: Run shellspec Tests
        run: |
          # Environment variables from .envrc are now available
          shellspec --no-kcov
  
  shellspec-ubuntu:
    name: "Ubuntu (Optimized)"
    runs-on: ubuntu-22.04
    if: "!contains(github.event.head_commit.message, 'ci skip')"
    steps:
      - name: Checkout Code with full history
        uses: actions/checkout@v4
        with:
          fetch-depth: 0   # Full history needed for release-it to generate proper changelog
          fetch-tags: true # For correct version detection by release-it
      
      - name: Try to use Docker image
        id: docker_check
        run: |
          if docker pull ghcr.io/${{ github.repository }}/e-bash-ci:latest 2>/dev/null; then
            echo "docker_available=true" >> $GITHUB_OUTPUT
            echo "Docker image available, will use container"
          else
            echo "docker_available=false" >> $GITHUB_OUTPUT
            echo "Docker image not available, will use optimized setup"
          fi
      
      - name: Run tests with Docker (if available)
        if: steps.docker_check.outputs.docker_available == 'true'
        run: |
          docker run --rm \
            -v ${{ github.workspace }}:/workspace \
            -w /workspace \
            ghcr.io/${{ github.repository }}/e-bash-ci:latest \
            bash -c "direnv allow . && direnv export gha > /tmp/env && source /tmp/env && shellspec"
      
      - name: Cache APT packages (fallback)
        if: steps.docker_check.outputs.docker_available == 'false'
        uses: actions/cache@v4
        with:
          path: /var/cache/apt
          key: ${{ runner.os }}-apt-${{ hashFiles('**/*.sh') }}
          restore-keys: |
            ${{ runner.os }}-apt-
      
      - name: Cache Homebrew installation (fallback)
        if: steps.docker_check.outputs.docker_available == 'false'
        uses: actions/cache@v4
        with:
          path: |
            /home/linuxbrew/.linuxbrew
            ~/.cache/Homebrew
          key: ${{ runner.os }}-homebrew-${{ hashFiles('.envrc') }}
          restore-keys: |
            ${{ runner.os }}-homebrew-
      
      - name: Cache local binaries (fallback)
        if: steps.docker_check.outputs.docker_available == 'false'
        uses: actions/cache@v4
        with:
          path: ~/.local/bin
          key: ${{ runner.os }}-local-bin-${{ hashFiles('.envrc') }}
          restore-keys: |
            ${{ runner.os }}-local-bin-
      
      - name: Setup dependencies (fallback)
        if: steps.docker_check.outputs.docker_available == 'false'
        run: |
          echo "${HOME}/.local/bin" >> "$GITHUB_PATH"
          mkdir -p "${HOME}/.local/bin"
          
          # Install system dependencies
          sudo apt-get update -qq
          sudo apt-get install -y -qq \
            curl build-essential procps file git \
            gawk sed grep coreutils jq shellcheck \
            libc6-dev gcc g++ make pkg-config \
            zlib1g-dev libssl-dev libffi-dev \
            python3-dev python3-pip
          
          # Install or restore Homebrew
          if [ ! -f "/home/linuxbrew/.linuxbrew/bin/brew" ]; then
            NONINTERACTIVE=1 /bin/bash -c "$(curl -fsSL https://raw.githubusercontent.com/Homebrew/install/HEAD/install.sh)"
          fi
          
          # Setup Homebrew environment
          echo "/home/linuxbrew/.linuxbrew/bin:/home/linuxbrew/.linuxbrew/sbin" >> "$GITHUB_PATH"
          eval "$(/home/linuxbrew/.linuxbrew/bin/brew shellenv)"
          
          # Install missing tools
          if ! command -v direnv &> /dev/null; then
            curl -sfL https://direnv.net/install.sh | bash
          fi
          
          if ! command -v shellspec &> /dev/null; then
            brew install shellspec
          fi
          
          brew install grep gnu-sed
          
          # Setup project dependencies
          direnv allow .
          direnv export gha >> "$GITHUB_ENV"
      
      - name: Run shellspec tests (fallback)
        if: steps.docker_check.outputs.docker_available == 'false'
        run: |
          shellspec --no-kcov
