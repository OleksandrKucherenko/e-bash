name: "Shellspec"

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]

env:
  SHELLSPEC_VERSION: 0.28.1
  TERM: xterm-256color
  HOMEBREW_NO_AUTO_UPDATE: 1
  HOMEBREW_NO_INSTALL_CLEANUP: 1
  HOMEBREW_NO_ENV_HINTS: 1
  # Enable CI auto-install mode for dependencies
  CI_E_BASH_INSTALL_DEPENDENCIES: 1

jobs:
  shellspec-macos:
    name: "MacOS"
    runs-on: macos-latest
    if: "!contains(github.event.head_commit.message, 'ci skip')"
    steps:
      - name: Checkout Code with full history
        uses: actions/checkout@v4
        with:
          fetch-depth: 0   # Full history needed for release-it to generate proper changelog
          fetch-tags: true # For correct version detection by release-it
      
      - name: Cache Homebrew packages
        uses: actions/cache@v4
        with:
          path: |
            ~/Library/Caches/Homebrew
            /opt/homebrew/Cellar
            /opt/homebrew/bin
          key: ${{ runner.os }}-homebrew-${{ hashFiles('.envrc') }}
          restore-keys: |
            ${{ runner.os }}-homebrew-
      
      - name: Cache local binaries
        uses: actions/cache@v4
        with:
          path: ~/.local/bin
          key: ${{ runner.os }}-local-bin-${{ hashFiles('.envrc') }}
          restore-keys: |
            ${{ runner.os }}-local-bin-
      
      - name: Setup PATH for local binaries
        run: |
          echo "${HOME}/.local/bin" >> "$GITHUB_PATH"
          mkdir -p "${HOME}/.local/bin"
      
      - name: Pre-install heavy dependencies in parallel
        run: |
          # Install heavy dependencies in background to leverage caching
          echo "Pre-installing heavy dependencies..."
          
          # Install core dependencies first
          if ! command -v direnv &> /dev/null; then
            brew install direnv &
          fi
          if ! command -v shellspec &> /dev/null; then
            brew install shellspec &
          fi
          
          # Install other dependencies in parallel (background)
          brew install grep gnu-sed gawk coreutils jq &
          
          # Wait for core dependencies
          wait
          echo "Core dependencies installed"
      
      - name: Setup project dependencies using DIRENV
        run: |
          # Allow .envrc execution and export environment to GitHub Actions
          direnv allow .
          direnv export gha >> "$GITHUB_ENV"
          echo "Dependencies loaded via DIRENV"
      
      - name: Run shellspec Tests
        run: |
          # Environment variables from .envrc are now available
          shellspec --no-kcov
  
  shellspec-ubuntu:
    name: "Ubuntu"
    runs-on: ubuntu-22.04
    if: "!contains(github.event.head_commit.message, 'ci skip')"
    steps:
      - name: Checkout Code with full history
        uses: actions/checkout@v4
        with:
          fetch-depth: 0   # Full history needed for release-it to generate proper changelog
          fetch-tags: true # For correct version detection by release-it
      
      - name: Cache APT packages
        uses: actions/cache@v4
        with:
          path: /var/cache/apt
          key: ${{ runner.os }}-apt-${{ hashFiles('**/*.sh') }}
          restore-keys: |
            ${{ runner.os }}-apt-
      
      - name: Cache Homebrew installation
        uses: actions/cache@v4
        with:
          path: |
            /home/linuxbrew/.linuxbrew
            ~/.cache/Homebrew
          key: ${{ runner.os }}-homebrew-${{ hashFiles('.envrc') }}
          restore-keys: |
            ${{ runner.os }}-homebrew-
      
      - name: Cache local binaries
        uses: actions/cache@v4
        with:
          path: ~/.local/bin
          key: ${{ runner.os }}-local-bin-${{ hashFiles('.envrc') }}
          restore-keys: |
            ${{ runner.os }}-local-bin-
      
      - name: Setup PATH for local binaries
        run: |
          echo "${HOME}/.local/bin" >> "$GITHUB_PATH"
          mkdir -p "${HOME}/.local/bin"
      
      - name: Install system dependencies with pre-installation
        run: |
          # Install system packages in parallel for speed
          sudo apt-get update -qq &
          
          # Pre-install common dependencies that Homebrew packages need
          sudo apt-get install -y -qq \
            curl build-essential procps file git \
            gawk sed grep coreutils jq shellcheck \
            libc6-dev gcc g++ make pkg-config \
            zlib1g-dev libssl-dev libffi-dev \
            python3-dev python3-pip &
          
          wait
          echo "System dependencies installed"
      
      - name: Install or restore Homebrew (optimized)
        run: |
          if [ ! -f "/home/linuxbrew/.linuxbrew/bin/brew" ]; then
            echo "Installing Homebrew..."
            # Install Homebrew with minimal dependencies
            NONINTERACTIVE=1 /bin/bash -c "$(curl -fsSL https://raw.githubusercontent.com/Homebrew/install/HEAD/install.sh)"
          else
            echo "Homebrew restored from cache"
          fi
          
          # Setup Homebrew environment
          echo "/home/linuxbrew/.linuxbrew/bin:/home/linuxbrew/.linuxbrew/sbin" >> "$GITHUB_PATH"
          eval "$(/home/linuxbrew/.linuxbrew/bin/brew shellenv)"
          echo "HOMEBREW_PREFIX=/home/linuxbrew/.linuxbrew" >> "$GITHUB_ENV"
          echo "HOMEBREW_CELLAR=/home/linuxbrew/.linuxbrew/Cellar" >> "$GITHUB_ENV"
          echo "HOMEBREW_REPOSITORY=/home/linuxbrew/.linuxbrew/Homebrew" >> "$GITHUB_ENV"
      
      - name: Install missing tools in parallel
        run: |
          eval "$(/home/linuxbrew/.linuxbrew/bin/brew shellenv)"
          
          # Install direnv (lightweight)
          if ! command -v direnv &> /dev/null; then
            curl -sfL https://direnv.net/install.sh | bash &
          fi
          
          # Install shellspec (essential for tests)
          if ! command -v shellspec &> /dev/null; then
            brew install shellspec &
          fi
          
          # Install GNU tools that aren't available via apt with correct names
          brew install grep gnu-sed &
          
          wait
          echo "Missing tools installed"
      
      - name: Setup project dependencies
        run: |
          eval "$(/home/linuxbrew/.linuxbrew/bin/brew shellenv)"
          # Allow .envrc execution and export environment to GitHub Actions
          direnv allow .
          direnv export gha >> "$GITHUB_ENV"
          echo "Dependencies loaded via DIRENV"
      
      - name: Run shellspec tests
        run: |
          # Environment variables from .envrc are now available (includes GNU tools setup)
          shellspec --no-kcov
