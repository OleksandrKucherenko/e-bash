name: "Shellspec"

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]

env:
  SHELLSPEC_VERSION: 0.28.1
  TERM: xterm-256color
  HOMEBREW_NO_AUTO_UPDATE: 1
  HOMEBREW_NO_INSTALL_CLEANUP: 1
  HOMEBREW_NO_ENV_HINTS: 1
  # Enable CI auto-install mode for dependencies
  CI_E_BASH_INSTALL_DEPENDENCIES: 1

jobs:
  shellspec-macos:
    name: "MacOS"
    runs-on: macos-latest
    if: "!contains(github.event.head_commit.message, 'ci skip')"
    steps:
      - name: Checkout Code with full history
        uses: actions/checkout@v4
        with:
          fetch-depth: 0   # Full history needed for release-it to generate proper changelog
          fetch-tags: true # For correct version detection by release-it
      
      - name: Cache Homebrew packages
        uses: actions/cache@v4
        with:
          path: |
            ~/Library/Caches/Homebrew
            /opt/homebrew/Cellar
            /opt/homebrew/bin
          key: ${{ runner.os }}-homebrew-${{ hashFiles('.envrc') }}
          restore-keys: |
            ${{ runner.os }}-homebrew-
      
      - name: Cache local binaries
        uses: actions/cache@v4
        with:
          path: ~/.local/bin
          key: ${{ runner.os }}-local-bin-${{ hashFiles('.envrc') }}
          restore-keys: |
            ${{ runner.os }}-local-bin-
      
      - name: Setup PATH for local binaries
        run: |
          echo "${HOME}/.local/bin" >> "$GITHUB_PATH"
          mkdir -p "${HOME}/.local/bin"
      
      - name: Pre-install heavy dependencies in parallel
        run: |
          # Install heavy dependencies in background to leverage caching
          echo "Pre-installing heavy dependencies..."
          
          # Install core dependencies first
          if ! command -v direnv &> /dev/null; then
            brew install direnv &
          fi
          if ! command -v shellspec &> /dev/null; then
            brew install shellspec &
          fi
          
          # Install other dependencies in parallel (background)
          brew install grep gnu-sed gawk coreutils jq &
          
          # Wait for core dependencies
          wait
          echo "Core dependencies installed"
      
      - name: Setup project dependencies using DIRENV
        run: |
          # Allow .envrc execution and export environment to GitHub Actions
          direnv allow .
          direnv export gha >> "$GITHUB_ENV"
          echo "Dependencies loaded via DIRENV"
      
      - name: Run shellspec Tests
        run: |
          # Environment variables from .envrc are now available
          shellspec --no-kcov
  
  shellspec-ubuntu:
    name: "Ubuntu (Docker)"
    runs-on: ubuntu-latest
    container:
      image: ghcr.io/${{ github.repository }}/e-bash-ci:latest
      credentials:
        username: ${{ github.actor }}
        password: ${{ secrets.GITHUB_TOKEN }}
    if: "!contains(github.event.head_commit.message, 'ci skip')"
    steps:
      - name: Checkout Code with full history
        uses: actions/checkout@v4
        with:
          fetch-depth: 0   # Full history needed for release-it to generate proper changelog
          fetch-tags: true # For correct version detection by release-it
      
      - name: Setup project dependencies (Docker)
        run: |
          # All dependencies are pre-installed in the Docker image
          # Just need to setup direnv and export environment
          direnv allow .
          direnv export gha >> "$GITHUB_ENV"
          echo "Dependencies loaded from pre-built Docker image"
      
      - name: Verify dependencies
        run: |
          echo "=== Verifying pre-installed dependencies ==="
          echo "Bash: $(bash --version | head -1)"
          echo "Git: $(git --version)"
          echo "Direnv: $(direnv version)"
          echo "Shellspec: $(shellspec --version)"
          echo "Shellcheck: $(shellcheck --version | head -1)"
          echo "Shfmt: $(shfmt --version)"
          echo "GNU Grep: $(ggrep --version | head -1)"
          echo "GNU Sed: $(gsed --version | head -1)"
          echo "GNU Awk: $(gawk --version | head -1)"
          echo "JQ: $(jq --version)"
          echo "Kcov: $(kcov --version | head -1)"
          echo "Watchman: $(watchman --version)"
      
      - name: Run shellspec tests
        run: |
          # Environment variables from .envrc are now available
          shellspec
