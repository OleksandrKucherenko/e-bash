name: "Shellspec"

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]

env:
  SHELLSPEC_VERSION: 0.28.1
  TERM: xterm-256color
  HOMEBREW_NO_AUTO_UPDATE: 1
  HOMEBREW_NO_INSTALL_CLEANUP: 1
  HOMEBREW_NO_ENV_HINTS: 1
  # Enable CI auto-install mode for dependencies
  CI_E_BASH_INSTALL_DEPENDENCIES: 1
  # Skip heavy dependencies in CI for faster execution
  CI_SKIP_HEAVY_DEPS: 1

jobs:
  shellspec-macos:
    name: "MacOS"
    runs-on: macos-latest
    if: "!contains(github.event.head_commit.message, 'ci skip')"
    steps:
      - name: Checkout Code with full history
        uses: actions/checkout@v4
        with:
          fetch-depth: 0   # Full history needed for release-it to generate proper changelog
          fetch-tags: true # For correct version detection by release-it
      
      - name: Cache Homebrew packages
        uses: actions/cache@v4
        with:
          path: |
            ~/Library/Caches/Homebrew
            /opt/homebrew/Cellar
            /opt/homebrew/bin
          key: ${{ runner.os }}-homebrew-${{ hashFiles('.envrc') }}
          restore-keys: |
            ${{ runner.os }}-homebrew-
      
      - name: Cache local binaries
        uses: actions/cache@v4
        with:
          path: ~/.local/bin
          key: ${{ runner.os }}-local-bin-${{ hashFiles('.envrc') }}
          restore-keys: |
            ${{ runner.os }}-local-bin-
      
      - name: Setup PATH for local binaries
        run: |
          echo "${HOME}/.local/bin" >> "$GITHUB_PATH"
          mkdir -p "${HOME}/.local/bin"
      
      - name: Install essential dependencies only
        run: |
          # Install only essential tools for CI, skip development-only dependencies
          if ! command -v direnv &> /dev/null; then
            brew install direnv
          fi
          if ! command -v shellspec &> /dev/null; then
            brew install shellspec
          fi
          # Skip: watchman, kcov (not needed for basic tests)
          echo "Essential dependencies installed"
      
      - name: Setup project dependencies using DIRENV (CI mode)
        run: |
          # Set CI-specific environment to skip heavy dependencies
          export CI_SKIP_HEAVY_DEPS=1
          # Allow .envrc execution and export environment to GitHub Actions
          direnv allow .
          direnv export gha >> "$GITHUB_ENV"
          echo "Dependencies loaded via DIRENV in CI mode"
      
      - name: Run shellspec Tests
        run: |
          # Environment variables from .envrc are now available
          shellspec --no-kcov
  
  shellspec-ubuntu:
    name: "Ubuntu"
    runs-on: ubuntu-22.04
    if: "!contains(github.event.head_commit.message, 'ci skip')"
    steps:
      - name: Checkout Code with full history
        uses: actions/checkout@v4
        with:
          fetch-depth: 0   # Full history needed for release-it to generate proper changelog
          fetch-tags: true # For correct version detection by release-it
      
      - name: Cache APT packages
        uses: actions/cache@v4
        with:
          path: /var/cache/apt
          key: ${{ runner.os }}-apt-${{ hashFiles('**/*.sh') }}
          restore-keys: |
            ${{ runner.os }}-apt-
      
      - name: Cache Homebrew installation
        uses: actions/cache@v4
        with:
          path: |
            /home/linuxbrew/.linuxbrew
            ~/.cache/Homebrew
          key: ${{ runner.os }}-homebrew-${{ hashFiles('.envrc') }}
          restore-keys: |
            ${{ runner.os }}-homebrew-
      
      - name: Cache local binaries
        uses: actions/cache@v4
        with:
          path: ~/.local/bin
          key: ${{ runner.os }}-local-bin-${{ hashFiles('.envrc') }}
          restore-keys: |
            ${{ runner.os }}-local-bin-
      
      - name: Setup PATH for local binaries
        run: |
          echo "${HOME}/.local/bin" >> "$GITHUB_PATH"
          mkdir -p "${HOME}/.local/bin"
      
      - name: Install system dependencies (optimized)
        run: |
          # Use system packages where possible instead of Homebrew
          sudo apt-get update -qq
          sudo apt-get install -y -qq \
            curl build-essential procps file git \
            gawk sed grep coreutils jq \
            shellcheck
          # Skip kcov for faster CI (only needed for coverage)
          echo "System dependencies installed"
      
      - name: Install or restore Homebrew
        run: |
          if [ ! -f "/home/linuxbrew/.linuxbrew/bin/brew" ]; then
            echo "Installing Homebrew..."
            /bin/bash -c "$(curl -fsSL https://raw.githubusercontent.com/Homebrew/install/HEAD/install.sh)"
          else
            echo "Homebrew restored from cache"
          fi
          # Add Homebrew to PATH
          echo "/home/linuxbrew/.linuxbrew/bin:/home/linuxbrew/.linuxbrew/sbin" >> "$GITHUB_PATH"
          eval "$(/home/linuxbrew/.linuxbrew/bin/brew shellenv)"
          echo "HOMEBREW_PREFIX=/home/linuxbrew/.linuxbrew" >> "$GITHUB_ENV"
          echo "HOMEBREW_CELLAR=/home/linuxbrew/.linuxbrew/Cellar" >> "$GITHUB_ENV"
          echo "HOMEBREW_REPOSITORY=/home/linuxbrew/.linuxbrew/Homebrew" >> "$GITHUB_ENV"
      
      - name: Install essential tools only
        run: |
          # Install only what's not available via apt
          if ! command -v direnv &> /dev/null; then
            curl -sfL https://direnv.net/install.sh | bash
          fi
          if ! command -v shellspec &> /dev/null; then
            eval "$(/home/linuxbrew/.linuxbrew/bin/brew shellenv)"
            brew install shellspec
          fi
          echo "Essential tools installed"
      
      - name: Setup project dependencies (CI mode)
        run: |
          # Set CI-specific environment to skip heavy dependencies
          export CI_SKIP_HEAVY_DEPS=1
          eval "$(/home/linuxbrew/.linuxbrew/bin/brew shellenv)"
          # Allow .envrc execution and export environment to GitHub Actions
          direnv allow .
          direnv export gha >> "$GITHUB_ENV"
          echo "Dependencies loaded via DIRENV in CI mode"
      
      - name: Run shellspec tests
        run: |
          # Environment variables from .envrc are now available (includes GNU tools setup)
          shellspec --no-kcov
